# Approved source registry for the AZ-700 agent system.
# Agents must ground factual Azure/exam claims in Tier 1 sources.
# Tier 3 sources may never be the sole source for a factual claim.
approved_sources:
  tier_1_authoritative:
    - name: "Official AZ-700 Study Guide"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/credentials/certifications/resources/study-guides/az-700"
      use_for:
        - "exam domains"
        - "skills measured"
        - "weights"
        - "exam updates"
      trust: "highest"

    - name: "Microsoft Certified: Azure Network Engineer Associate certification page"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/credentials/certifications/azure-network-engineer-associate/"
      use_for:
        - "certification overview"
        - "exam registration information"
        - "practice assessment"
        - "exam sandbox"
      trust: "highest"

    - name: "Azure product documentation"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/azure/?product=networking"
      use_for:
        - "service behaviour"
        - "configuration guidance"
        - "limits"
        - "feature capabilities"
      trust: "highest"

    - name: "Microsoft Learn AZ-700 training path"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/training/courses/az-700t00"
      use_for:
        - "learning modules"
        - "hands-on learning path"
        - "structured study"
      trust: "high"

  tier_2_design_guidance:
    - name: "Azure Architecture Center"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/azure/architecture/"
      use_for:
        - "reference architectures"
        - "design patterns"
        - "scenario-based learning"
      trust: "high"

    - name: "Cloud Adoption Framework"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/azure/cloud-adoption-framework/"
      use_for:
        - "enterprise network design"
        - "landing zone networking"
        - "governance"
      trust: "high"

    - name: "Azure Well-Architected Framework"
      type: "Microsoft Learn"
      url: "https://learn.microsoft.com/azure/well-architected/"
      use_for:
        - "reliability"
        - "security"
        - "cost optimisation"
        - "operational excellence"
      trust: "high"

  tier_3_optional:
    - name: "Community blogs"
      use_for:
        - "extra explanations only"
      trust: "low"
      rule: "Never use as sole source for factual exam or Azure feature claims."

    - name: "Third-party study guides"
      use_for:
        - "extra practice ideas only"
      trust: "low"
      rule: "Cross-check with Microsoft Learn."

citation_policy:
  require_sources_section: true
  exception: "User explicitly asks for a quick answer."
  forbidden:
    - "Inventing Azure limits"
    - "Inventing SKU capabilities"
    - "Inventing pricing facts"
    - "Inventing exam changes"
