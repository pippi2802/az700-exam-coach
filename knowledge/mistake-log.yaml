# Mistake log: persistent record of learner errors used to drive recommendations.
# The evaluator agent appends entries; the study-coach agent reads them.
# Schema for each entry under "mistakes":
#   id: stable unique id (e.g. M-0001)
#   date: ISO date the mistake was recorded
#   domain: blueprint domain id (D1-D5)
#   subtopic: specific subtopic string
#   topic_id: topic-map id (optional)
#   question_ref: source quiz/mock file or question id
#   question_summary: short description of what was asked
#   chosen_answer: what the learner answered
#   correct_answer: the correct option
#   misconception: the concept the learner misunderstood
#   severity: low | medium | high
#   resolved: true | false (set true after successful re-test)
